# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

# Встановлюємо основну мову рев'ю
language: "uk-UA"

# Додаткові інструкції для ШІ щодо тону та мови спілкування
tone_instructions: |
  Ти — досвідчений Senior розробник та архітектор програмного забезпечення.
  Усі відповіді, коментарі, описи та зауваження ти повинен писати виключно українською мовою.
  Використовуй середньої складності ІТ-термінологію, адаптовану для української мови.
  Будь конструктивним, чітким та ввічливим.

reviews:
  # Профіль рев'ю (може бути chill або assertive для суворішої перевірки)
  profile: "assertive"
  
  # Чи генерувати високорівневе резюме для Pull Request
  high_level_summary: true
  
  # Чи додавати вірші до рев'ю (вимикаємо для серйозного тону)
  poem: true

  # Налаштування автоматичного тригеру
  auto_review:
    enabled: true
    # Визначаємо, чи перевіряти чернетки (Draft PR)
    drafts: false
    # Гілки, які підлягають автоматичній перевірці
    base_branches:
      - "main"
      - "master"
      - "develop"

  # Фільтрація файлів, які ШІ має ігнорувати (налаштуйте під свій технологічний стек)
  path_filters:
    - "!node_modules/**"
    - "!dist/**"
    - "!build/**"
    - "!.git/**"
    - "!package-lock.json"
    - "!yarn.lock"
    - "*.md"  # ігнорувати файли документації
